version: "3.8"

services:
  llm-jax:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./configs:/app/configs:ro
    environment:
      - JAX_PLATFORM_NAME=cpu   # Change to "gpu" if CUDA available
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3