# Smaller model for fast CPU training (~10 min on M4)
vocab_size: 50257
d_model: 256
n_heads: 4
n_layers: 4
d_ff: 1024
max_seq_len: 128
dropout_rate: 0.1

# Training
batch_size: 8
learning_rate: 5.0e-4
warmup_steps: 200
max_steps: 10000
weight_decay: 0.1
grad_clip: 1.0
seed: 42

# Data
dataset: "roneneldan/TinyStories"
tokenizer: "tiktoken"
tokenizer_name: "gpt2"

# Checkpointing
checkpoint_dir: "./checkpoints"
save_every: 2500
eval_every: 500

# Serving
serve_port: 8000
max_new_tokens: 256
temperature: 0.8
top_k: 50

# ── Logging ──
logging:
  wandb: false                  # set true to enable
  wandb_project: "llm-jax"
  tensorboard: false            # set true to enable
  tb_log_dir: "./runs"
